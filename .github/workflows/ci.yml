name: CI

on:
  push:
    branches:
      - main
      - deployable
  pull_request:
    branches:
      - main
      - deployable

jobs:
  validate:
    name: Validation + Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Validate repository structure
        run: npm run validate:structure

      - name: Install dependencies
        run: npm ci

      - name: Run complete validation suite
        run: npm run validate:all

  docker:
    name: Docker Foundation Validation
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Docker build, startup, and container smoke tests
        run: npm run validate:docker
