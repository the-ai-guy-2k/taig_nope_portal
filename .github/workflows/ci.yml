name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - deployable
  pull_request:
    branches:
      - main
      - deployable

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  DOCKER_IMAGE_LOCAL: taig-nope-portal:ci
  DOCKER_HUB_IMAGE_NAME: taig_nope_portal
  CI_REPORT_DIR: ci-reports

permissions:
  contents: read

jobs:
  validate:
    name: Validation + Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Record build metadata
        run: node scripts/ci-metadata.js

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Validate repository structure
        run: npm run validate:structure

      - name: Install dependencies
        run: npm ci

      - name: Run complete validation suite
        run: npm run validate:all

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports-validate
          path: ci-reports/
          retention-days: 14

      - name: Write job summary
        if: always()
        run: node scripts/ci-pipeline-summary.js

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image with cache
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: ${{ env.DOCKER_IMAGE_LOCAL }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=taig-nope-portal
            org.opencontainers.image.description=NOPE Lite TAIG NOPE Portal
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate container runtime
        env:
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE_LOCAL }}
          SKIP_DOCKER_BUILD: 'true'
        run: npm run validate:docker

      - name: Upload Docker build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports-docker-build
          path: ci-reports/
          retention-days: 14

      - name: Write job summary
        if: always()
        run: node scripts/ci-pipeline-summary.js

  publish:
    name: Docker Hub Publish
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/deployable' && github.event_name == 'push'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Docker Hub secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets are required to publish from deployable."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_HUB_IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_HUB_IMAGE_NAME }}:deployable
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_HUB_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=taig-nope-portal
            org.opencontainers.image.description=NOPE Lite TAIG NOPE Portal
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Verify published image manifests
        env:
          DOCKER_HUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_HUB_IMAGE_NAME }}
        run: node scripts/ci-docker-publish.js

      - name: Upload publish reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports-publish
          path: ci-reports/
          retention-days: 30

      - name: Write job summary
        if: always()
        run: node scripts/ci-pipeline-summary.js

  docker-pull-validation:
    name: Docker Pull Validation + Smoke
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/deployable' && github.event_name == 'push'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download publish reports
        uses: actions/download-artifact@v4
        with:
          name: ci-reports-publish
          path: ci-reports

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Pull and validate published image
        env:
          DOCKER_HUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_HUB_IMAGE_NAME }}
          DOCKER_PULL_TAG: deployable
        run: npm run validate:docker-pull

      - name: Upload pull validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports-docker-pull
          path: ci-reports/
          retention-days: 30

      - name: Write job summary
        if: always()
        run: node scripts/ci-pipeline-summary.js

  pipeline-report:
    name: Pipeline Report
    runs-on: ubuntu-latest
    needs:
      - validate
      - docker-build
      - publish
      - docker-pull-validation
    if: always()

    steps:
      - name: Download CI reports
        uses: actions/download-artifact@v4
        with:
          pattern: ci-reports-*
          path: ci-reports
          merge-multiple: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Record pipeline performance
        run: node scripts/ci-pipeline-performance.js

      - name: Upload consolidated pipeline reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports-pipeline
          path: ci-reports/
          retention-days: 30

      - name: Write workflow summary
        if: always()
        run: node scripts/ci-pipeline-summary.js

      - name: Fail pipeline if required jobs failed
        if: |
          needs.validate.result != 'success' ||
          needs.docker-build.result != 'success' ||
          needs.publish.result == 'failure' ||
          needs.docker-pull-validation.result == 'failure'
        run: |
          echo "Pipeline failed."
          echo "  validate: ${{ needs.validate.result }}"
          echo "  docker-build: ${{ needs.docker-build.result }}"
          echo "  publish: ${{ needs.publish.result }}"
          echo "  docker-pull-validation: ${{ needs.docker-pull-validation.result }}"
          exit 1
